name: Update Market Data

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh market.json
        run: node scripts/refresh-market.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/market.json; then
            echo "no change"
          else
            git add data/market.json
            git commit -m "chore: auto update market data"
            git push
          fi
